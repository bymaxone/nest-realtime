# Static security analysis (CodeQL) for JavaScript/TypeScript on every PR and weekly.
name: CodeQL

on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  # CodeQL code scanning needs GitHub Advanced Security, free only on public
  # repositories — gate on public visibility so it is skipped (CI green) while the
  # repository is private and runs automatically once it is public.
  analyze:
    name: analyze
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
