# Tag-driven release workflow. Triggered only by pushing a `v*` tag.
# Publishes @bymax-one/nest-realtime to npm with OIDC provenance attestation.
# The publish job is gated by the `npm-publish` environment (manual approval required).
# This workflow is INERT until a human pushes a tag — never auto-triggered on PRs or branches.
# NODE_AUTH_TOKEN is read from the NPM_TOKEN repository secret; configure it before the first release.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write   # required for OIDC trusted publishing (provenance)
      contents: write   # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.0.0

      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Guard: the pushed tag MUST match the version in package.json.
      # Prevents accidental publishes caused by a mismatched tag.
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match package.json version '${PKG_VERSION}'" >&2
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches package.json version ${PKG_VERSION} ✓"

      - name: Run prepublishOnly gate
        run: pnpm prepublishOnly

      - name: Run bundle-size gate
        run: pnpm size

      - name: Publish to npm (with provenance)
        run: pnpm publish --provenance --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
